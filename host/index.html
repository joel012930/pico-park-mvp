<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pico Park Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
        
        /* ESTILOS DEL MENÚ */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        h1 { color: white; font-size: 50px; margin-bottom: 40px; letter-spacing: 5px; }
        button {
            padding: 15px 40px; margin: 10px; font-size: 20px; font-weight: bold;
            cursor: pointer; background: #0a84ff; color: white; border: none; border-radius: 8px;
            transition: 0.2s;
        }
        button:hover { background: #005bb5; transform: scale(1.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>PICO PARK MVP</h1>
        <button onclick="iniciarNivel(1)">NIVEL 1 (Fácil)</button>
        <button onclick="iniciarNivel(2)">NIVEL 2 (Obstáculos)</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
